name: 🚀 Complete CI/CD Pipeline (Test → Terraform → Build → Deploy)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - dev
          - staging
          - prod
      deploy_to_ecs:
        description: 'Deploy to ECS'
        required: false
        type: boolean
        default: true

env:
  AWS_REGION: us-east-1 # Hardcoding to us-east-1 as it is the standard for AWS Academy labs and prevents secret-masking issues
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # PHASE 1: TESTING
  # ═══════════════════════════════════════════════════════════════════════════

  test-backend:
    name: Test Backend (Unit & Integration)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server

    steps:
      - name:  Checkout code
        uses: actions/checkout@v4

      - name:  Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./server/package-lock.json

      - name:  Install dependencies
        run: npm ci

      - name:  Run linter
        run: npm run lint
        continue-on-error: true

      - name:  Check formatting
        run: npm run format:check
        continue-on-error: true

      - name: Run tests with coverage
        run: npm run test -- --coverage --reporters=default --reporters=jest-junit
        env:
          JEST_JUNIT_OUTPUT_DIR: ./test-results
          JEST_JUNIT_OUTPUT_NAME: junit.xml

      - name:  Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: server/test-results/
          retention-days: 30

      - name:  Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: server/coverage/
          retention-days: 30

      - name:  Publish test report
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: 'server/test-results/junit.xml'
          fail_on_failure: true
          detailed_summary: true
          include_passed: true

  test-frontend:
    name:  Test Frontend (Unit, Integration & E2E)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name:  Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name:  Run linter
        run: npm run lint
        continue-on-error: true

      - name:  Check formatting
        run: npm run format:check
        continue-on-error: true

      - name:  Run unit tests
        run: npm run test:unit -- --coverage
        continue-on-error: true

      - name: Run integration tests
        run: npm run test:integration -- --coverage
        continue-on-error: true

      - name: Run E2E tests
        run: npm run test:e2e
        continue-on-error: true

      - name:  Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-test-results
          path: client/test-results/
          retention-days: 30

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: client/coverage/
          retention-days: 30

      - name:  Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: client/playwright-report/
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════════
  # PHASE 2: TERRAFORM INFRASTRUCTURE PROVISIONING
  # ═══════════════════════════════════════════════════════════════════════════

  terraform:
    name: 🏗️ Terraform Infrastructure
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    defaults:
      run:
        working-directory: ./terraform

    permissions:
      contents: read
      id-token: write

    steps:
      - name:  Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name:  Create terraform.tfvars
        run: |
          cat > terraform.tfvars <<EOF
          aws_region          = "${{ env.AWS_REGION }}"
          environment         = "${{ github.ref_name == 'main' && 'prod' || 'staging' }}"
          s3_bucket_name      = "shopsmart-data-v4-${{ github.ref_name }}-${{ github.repository_owner }}"
          ecr_repository_name = "shopsmart-app-v4"
          ecs_cluster_name    = "shopsmart-cluster-v4-${{ github.ref_name }}"
          ecs_task_cpu        = 512
          ecs_task_memory     = 1024
          ecs_desired_count   = 2
          container_image_tag = "${{ github.sha }}"
          EOF

      - name:  Terraform format check
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: 🪣 Setup Terraform State Backend
        run: |
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          STATE_BUCKET="shopsmart-tfstate-$OWNER_LOWER"
          
          if ! aws s3api head-bucket --bucket "$STATE_BUCKET" 2>/dev/null; then
            aws s3api create-bucket --bucket "$STATE_BUCKET" --region ${{ env.AWS_REGION }}
          fi
          
          cat <<EOF > backend.tf
          terraform {
            backend "s3" {
              bucket = "$STATE_BUCKET"
              key    = "terraform.tfstate"
              region = "${{ env.AWS_REGION }}"
            }
          }
          EOF

      - name:  Terraform init
        run: terraform init

      - name:  Terraform validate
        run: terraform validate

      - name:  Terraform plan
        run: terraform plan -out=tfplan -json > tfplan.json
        continue-on-error: true

      - name:  Upload Terraform plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: terraform/tfplan.json
          retention-days: 7

      - name: Terraform apply
        if: github.event_name == 'push'
        run: terraform apply -auto-approve tfplan

      - name:  Export Terraform outputs
        if: github.event_name == 'push'
        run: |
          terraform output -json > outputs.json
          echo "TERRAFORM_OUTPUTS<<EOF" >> $GITHUB_ENV
          cat outputs.json >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name:  Upload Terraform outputs
        uses: actions/upload-artifact@v4
        if: github.event_name == 'push'
        with:
          name: terraform-outputs
          path: terraform/outputs.json
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════════
  # PHASE 3: DOCKER BUILD & PUSH TO ECR
  # ═══════════════════════════════════════════════════════════════════════════

  build-and-push:
    name:  Docker Build & Push to ECR
    runs-on: ubuntu-latest
    needs: terraform
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    permissions:
      contents: read
      id-token: write

    outputs:
      image-uri: ${{ steps.image.outputs.image-uri }}
      image-digest: ${{ steps.image.outputs.image-digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name:  Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name:  Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name:  Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name:  Generate image tags
        id: image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: shopsmart-app-v4
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI=$ECR_REGISTRY/$ECR_REPOSITORY
          echo "image-uri=$IMAGE_URI" >> $GITHUB_OUTPUT
          echo "image-digest=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name:  Scan Dockerfile
        run: |
          # Verify multi-stage build
          echo "✓ Checking multi-stage build..."
          grep -c "^FROM" Dockerfile || exit 1
          
          # Verify non-root user
          echo "✓ Checking non-root user..."
          grep "USER[^_]" Dockerfile || exit 1
          
          # Verify healthcheck
          echo "✓ Checking healthcheck..."
          grep "HEALTHCHECK" Dockerfile || exit 1
          
          echo " Dockerfile validation passed"

      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ${{ env.IMAGE_URI }}:${{ env.IMAGE_TAG }},${{ env.IMAGE_URI }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE_URI }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_URI }}:buildcache,mode=max
          outputs: type=docker,dest=/tmp/image.tar

      - name: Scan Docker image for vulnerabilities
        run: |
          docker load --input /tmp/image.tar
          # Optional: Use Trivy or similar for scanning
          echo " Image scanning (implement your scanning tool here)"

      - name:  Push image to Amazon ECR
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.IMAGE_URI }}:${{ env.IMAGE_TAG }},${{ env.IMAGE_URI }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE_URI }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_URI }}:buildcache,mode=max

      - name:  Create image summary
        run: |
          echo "Docker Image Built Successfully" >> $GITHUB_STEP_SUMMARY
          echo "- Repository: ${{ steps.image.outputs.image-uri }}" >> $GITHUB_STEP_SUMMARY
          echo "- Tag: ${{ steps.image.outputs.image-digest }}" >> $GITHUB_STEP_SUMMARY

  # ═══════════════════════════════════════════════════════════════════════════
  # PHASE 4A: ECS DEPLOYMENT
  # ═══════════════════════════════════════════════════════════════════════════

  deploy-ecs:
    name:  Deploy to AWS ECS Fargate
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    permissions:
      contents: read
      id-token: write

    steps:
      - name:  Checkout code
        uses: actions/checkout@v4

      - name:  Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name:  Download task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition shopsmart-app-v4 \
            --query taskDefinition > task-definition.json

      - name:  Update task definition image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: shopsmart-container
          image: ${{ needs.build-and-push.outputs.image-uri }}:${{ needs.build-and-push.outputs.image-digest }}

      - name:  Deploy to ECS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: shopsmart-service-v4
          cluster: shopsmart-cluster-v4-${{ github.ref_name }}
          wait-for-service-stability: true

      - name:  Verify ECS service
        run: |
          aws ecs describe-services \
            --cluster shopsmart-cluster-v4-${{ github.ref_name }} \
            --services shopsmart-service-v4 \
            --query 'services[0].status' \
            --output text

      - name:  ECS deployment summary
        run: |
          echo "ECS Deployment Completed" >> $GITHUB_STEP_SUMMARY
          echo "- Cluster: shopsmart-cluster-v4-${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Service: shopsmart-service-v4" >> $GITHUB_STEP_SUMMARY
          echo "- Image: ${{ needs.build-and-push.outputs.image-uri }}:${{ needs.build-and-push.outputs.image-digest }}" >> $GITHUB_STEP_SUMMARY


  # ═══════════════════════════════════════════════════════════════════════════
  # VALIDATION & HEALTH CHECKS
  # ═══════════════════════════════════════════════════════════════════════════

  health-check:
    name:  Health & Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-ecs]
    if: always()
    
    steps:
      - name:  Checkout code
        uses: actions/checkout@v4

      - name:  Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get ALB endpoint (ECS)
        id: ecs-endpoint
        run: |
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --names shopsmart-alb-v3 \
            --query 'LoadBalancers[0].DNSName' \
            --output text 2>/dev/null || echo "N/A")
          echo "endpoint=http://$ALB_DNS" >> $GITHUB_OUTPUT

      - name: 🔍 Health check - ECS
        if: steps.ecs-endpoint.outputs.endpoint != 'http://N/A'
        continue-on-error: true
        run: |
          for i in {1..30}; do
            echo "Attempt $i: Checking health..."
            curl -f "${{ steps.ecs-endpoint.outputs.endpoint }}/api/health" && break
            sleep 10
          done

      - name: Health check summary
        run: |
          echo "Health & Smoke Tests Completed" >> $GITHUB_STEP_SUMMARY
          echo "- ECS Endpoint: ${{ steps.ecs-endpoint.outputs.endpoint }}" >> $GITHUB_STEP_SUMMARY
